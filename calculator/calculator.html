<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Poppins, sans-serif;
        }

        .calculator {
            width: 320px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        #display {
            width: 96%;
            height: 60px;
            font-size: 28px;
            margin-bottom: 20px;
            border: none;
            outline: none;
            padding: 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 14px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: rgba(255,255,255,0.4);
        }

        #equal {
            grid-column: span 2;
            background: #ff7eb3;
        }
    </style>    
</head>
<body>
    <div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button>AC</button>
        <button>DEL</button>
        <button>%</button>
        <button>/</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>*</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>+</button>

        <button>0</button>
        <button>.</button>
        <button id="equal">=</button>
    </div>


    <script>
        const display = document.getElementById('display');
        const buttons = document.querySelectorAll('.buttons button');
        buttons.forEach(buttons => {
            buttons.addEventListener('click', () => {
                const value = buttons.textContent;
                if (value === 'AC') {
                    display.value = '';
                } else if (value === 'DEL') {
                    display.value = display.value.slice(0, -1);
                } else if (value === '=') {
                    try {
                        display.value = eval(display.value.replace(/%/g, '/100'));
                    } catch (error) {
                        display.value = 'Wrong Input';
                    }
                } else {
                    display.value += value;
                }
            });
        });
    </script>


</div>
</body>
</html>
