<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Memory Game</h1>

    <div class="top-bar">
        <div class="info">⏱ Time: <span id="time">0</span>s</div>
        <div class="info">🌀 Moves: <span id="moves">0</span></div>
        <button id="restart">Restart</button>
    </div>

    <div id="game-board" class="board"></div>

    <div id="win-popup" class="popup hidden">
        <h2>You Won 🎉</h2>
        <p>Total Time: <span id="final-time"></span>s</p>
        <p>Total Moves: <span id="final-moves"></span></p>
        <button onclick="startGame()">Play Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
