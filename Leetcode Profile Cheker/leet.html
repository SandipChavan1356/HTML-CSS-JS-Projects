<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetMetrix</title>
    <link rel="stylesheet" href="leet.css">
</head>
<body>
    <div class="container">

        <h1>LeetMetrix</h1>

        <p>Enter Your Username:</p>
        <input type="text" placeholder="Username" id="username-input">
        <button id="search-btn">Submit</button>

        <!-- Animated Progress Circles -->
        <div class="progress">
            <div class="circuPro"><div id="easy"><span>easy</span></div></div>
            <div class="circuPro"><div id="medium"><span>medium</span></div></div>  
            <div class="circuPro"><div id="hard"><span>Hard</span></div></div>
        </div>

        <!-- New Glow Cards -->
        <div class="progresscard"></div>
        <div class="progresscard"></div>
        <div class="progresscard"></div>
        <div class="progresscard"></div>

    </div>

    <script src="leet.js"></script>
</body>
</html>
